<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>聊天 - Vibe</title>
  <link rel="stylesheet" href="../css/base/variables.css">
  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/typography.css">
  <link rel="stylesheet" href="../css/components/status-bar.css">
  <link rel="stylesheet" href="../css/components/nav-bar.css">
  <style>
    * { box-sizing: border-box; }
    body { background: #fff; }
    .phone-frame { width: 402px; height: 889px; margin: 0 auto; background: linear-gradient(180deg, rgba(0, 255, 246, 0.20) -13.92%, rgba(121, 255, 250, 0.40) -0.77%, #FFF 23.11%); display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .page { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: transparent; }

    /* Header gradient */
    .chat-header { background: transparent; flex-shrink: 0; }

    /* Status bar - black text on light header */
    .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 0; height: 44px; }
    .status-bar__time { font-size: 15px; font-weight: 600; color: #111; }
    .status-bar__indicators { display: flex; align-items: center; gap: 6px; }

    /* Title row */
    .chat-title-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 16px 12px; }
    .chat-title-left { display: flex; align-items: center; gap: 4px; position: relative; }
    .chat-title-star { width: 8px; height: 8px; position: absolute; top: -4px; left: -4px; }
    .chat-title-text { font-family: 'YouSheBiaoTiHei', sans-serif; font-size: 24px; color: #111; }
    .chat-title-actions { display: flex; align-items: center; gap: 16px; }
    .chat-title-actions svg { cursor: pointer; }

    /* Friend scroll */
    .friends-scroll { margin-top: 19px; padding: 0 12px 14px; display: flex; gap: 11px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .friends-scroll::-webkit-scrollbar { display: none; }
    .friend-item { width: 78px; display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; cursor: pointer; }
    .friend-avatar-wrap { position: relative; width: 68px; height: 67.4px; }
    .friend-avatar { width: 67.4px; height: 67.4px; border-radius: 50%; object-fit: cover; background: #ddd; }
    .friend-online-dot { position: absolute; right: 0; bottom: 0; width: 20px; height: 20px; border-radius: 50%; background: #00FF44; border: 4px solid #fff; }
    .friend-name-row { width: 78px; height: 24px; display: flex; align-items: center; justify-content: center; gap: 2px; }
    .friend-name { font-size: 13px; font-weight: 500; font-family: "PingFang SC", sans-serif; color: #111; white-space: nowrap; line-height: normal; }
    /* Gender icons inline */

    /* Chat list */
    .page-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .page-body::-webkit-scrollbar { display: none; }

    .chat-list { padding: 8px 0; }
    .chat-item { display: flex; align-items: center; gap: 12px; padding: 10px 56px 10px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; position: relative; }
    .chat-item + .chat-item::before { content: ''; position: absolute; left: 84px; right: 0; top: 0; height: 0; border-top: 0.2px solid rgba(34, 34, 34, 0.05); opacity: 1; }
    .chat-item:last-child::after { content: ''; position: absolute; left: 84px; right: 0; bottom: 0; height: 0; border-top: 0.2px solid rgba(34, 34, 34, 0.05); opacity: 1; }
    .chat-item:active { background: rgba(0,0,0,0.04); }
    .chat-avatar-wrap { position: relative; flex-shrink: 0; }
    .chat-avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; background: #e0e0e0; }
    .chat-online-dot { position: absolute; right: -2px; bottom: 0; width: 20px; height: 20px; border-radius: 50%; background: #00FF44; border: 4px solid #fff; }
    .chat-badge { position: absolute; right: 16px; top: 42px; width: 16px; height: 16px; background: #fa2b52; border-radius: 8px; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0; }
    .chat-item-body { flex: 1; min-width: 0; padding-right: 0; }
    .chat-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .chat-item-name { font-family: "PingFang SC", sans-serif; font-size: 16px; font-weight: 600; color: #111; line-height: 22px; }
    .chat-item-time { position: absolute; right: 16px; top: 17px; width: 30px; height: 15px; line-height: 15px; text-align: right; font-size: 11px; color: #bbb; flex-shrink: 0; }
    .chat-item-preview { font-family: "PingFang SC", sans-serif; font-size: 14px; font-weight: 400; line-height: 20px; color: rgba(34, 34, 34, 0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 264px; }
    .chat-item-preview.unread { color: rgba(34, 34, 34, 0.5); }

    .nav-bar { border-top: none; }
  </style>
</head>
