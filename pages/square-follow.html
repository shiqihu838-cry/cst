<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="../css/base/variables.css">
  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/typography.css">
  <link rel="stylesheet" href="../css/components/status-bar.css">
  <link rel="stylesheet" href="../css/components/nav-bar.css">
  <style>
    * { box-sizing: border-box; }
    .phone-frame { width: 402px; height: 889px; margin: 0 auto; background: linear-gradient(180deg, rgba(0, 255, 246, 0.20) -23.38%, rgba(121, 255, 250, 0.40) 6.37%, #F8F8F8 53.76%); display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .page { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: transparent; }

    /* Status bar */
    .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 0; height: 44px; }
    .status-bar__time { font-size: 15px; font-weight: 600; color: #111; }
    .status-bar__indicators { display: flex; align-items: center; gap: 6px; }

    /* Header gradient */
    .sq-header { position: relative; flex-shrink: 0; background: transparent; overflow: hidden; }
    .sq-header::before { content: none; }

    /* Tabs row */
    .sq-top-nav { display: flex; width: 376px; justify-content: space-between; align-items: center; margin: 1px auto 4px; position: relative; z-index: 3; }
    .sq-tabs-row { display: flex; align-items: center; gap: 25px; }
    .sq-tab { font-family: "PingFang SC", sans-serif; font-size: 19px; font-style: normal; font-weight: 500; line-height: normal; color: #000; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .sq-tab.is-active { font-family: "YouSheBiaoTiHei", sans-serif; font-size: 24px; font-style: normal; font-weight: 400; line-height: normal; color: #000; }
    /* Search bar */
    .sq-search { width: 167px; height: 28px; background: #ffffff; border-radius: 60px; display: flex; align-items: center; justify-content: space-between; padding: 4px 12px; box-shadow: none; flex-shrink: 0; }
    .sq-header > .status-bar {
      position: relative;
      z-index: 3;
    }
    .sq-search input { border: none; outline: none; font-size: 15px; color: #c4c5c7; background: transparent; min-width: 0; width: 100%; height: 21px; line-height: 21px; padding: 0; margin: 0; font-family: "PingFang SC", sans-serif; }
    .sq-search input:focus::placeholder { color: transparent; }

    /* Live row */
    .live-row { width: 373.41px; max-width: 100%; margin: 14px auto 8px; padding: 0; display: flex; justify-content: space-between; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .live-row::-webkit-scrollbar { display: none; }
    .live-user { width: 57.88px; display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; cursor: pointer; }
    .live-avatar-wrap { position: relative; width: 57.88px; height: 61.77px; }
    .live-ring { position: absolute; top: 0; left: 0; width: 57.88px; height: 57.88px; border-radius: 50%; border: 2px solid #00fff6; }
    .live-avatar { position: absolute; top: 2.94px; left: 2.94px; width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background: #ddd; }
    .live-badge { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); width: 36.64px; height: 15.75px; background: #00fff6; color: #111; font-size: 10px; font-weight: 700; line-height: 15.75px; text-align: center; border-radius: 7px; white-space: nowrap; padding: 0; }
    .live-name { width: 57.88px; font-size: 11px; line-height: 15px; color: #111; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }

    /* Scrollable body */
    .page-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
    .page-body::-webkit-scrollbar { display: none; }

    /* Masonry posts */
    .posts-masonry { padding: 8px 10px 0; display: flex; gap: 8px; }
    .masonry-col { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .post-card { background: #fff; border-radius: 8px; overflow: hidden; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .post-card__img { width: 100%; display: block; object-fit: cover; background: #e0e0e0; }
    .post-card__body { padding: 8px 10px 10px; }
    .post-card__title { font-size: 13px; color: #222; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .post-card__foot { display: flex; align-items: center; justify-content: space-between; }
    .post-card__author { display: flex; align-items: center; gap: 5px; }
    .post-card__avatar { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; background: #ddd; }
    .post-card__name { font-size: 11px; color: #999; }
    .post-card__likes { display: flex; align-items: center; gap: 3px; font-size: 11px; color: rgba(34, 34, 34, 0.5); }

    /* Nav bar override */
    .nav-bar { border-top: 1px solid rgba(0,0,0,0.06); }
  </style>
</head>
