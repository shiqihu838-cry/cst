<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手机号密码登录 - Vibe</title>
  <link rel="stylesheet" href="../css/base/variables.css">
  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/typography.css">
  <link rel="stylesheet" href="../css/components/status-bar.css">
  <link rel="stylesheet" href="../css/components/auth-nav-help.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
  <style>
    /* Figma 382:10089 Frame 979 — 手机号密码登录主区域 */
    .auth-page {
      background: #fff;
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: hidden;
      font-family: "PingFang SC", -apple-system, "Helvetica Neue", sans-serif;
    }
    .auth-content {
      padding: 16px 24px 0;
      flex: 1 1 auto;
      min-height: 0;
    }
    /* Figma 382:10091 — 手机号密码登录 */
    .pwd-title {
      font-size: 20px;
      font-weight: 600;
      line-height: 28px;
      letter-spacing: 0;
      color: #000;
      margin: 0 0 25px;
    }
    /* Figma 382:10154 — 两输入框纵向 itemSpacing 12 */
    .pwd-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    /* Figma 382:10094 / 382:10144 — 灰底圆角容器 */
    .pwd-field {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 50px;
      padding: 13px 17px;
      background: #f7f7f7;
      border-radius: 12px;
      border: none;
    }
    .pwd-field__prefix {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      font-size: 15px;
      font-weight: 500;
      line-height: 21px;
      color: #000;
      white-space: nowrap;
      cursor: pointer;
    }
    .pwd-field__prefix svg path {
      stroke: #222222;
    }
    /* Figma Vector 52 — 竖分割线 0.5px @ #222 30% */
    .pwd-field__rule {
      width: 0.5px;
      align-self: stretch;
      min-height: 10px;
      background: rgba(34, 34, 34, 0.3);
      flex-shrink: 0;
    }
    .pwd-field__input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      line-height: 21px;
      color: #222;
      padding: 0;
      caret-color: #222;
    }
    .pwd-field__input::placeholder {
      color: rgba(34, 34, 34, 0.4);
    }
    /* 用圆点遮挡，避免 type=password 在系统里再出现右侧小眼睛 */
    .pwd-field__input--masked {
      -webkit-text-security: disc;
    }
    .pwd-field__input[type="password"]::-ms-reveal,
    .pwd-field__input[type="password"]::-ms-clear {
      display: none;
    }
    /* Figma 385:10175 View_light — 左侧 24×24 可视区 */
    .pwd-field__eye {
      flex-shrink: 0;
      width: 42px;
      height: 24px;
      padding: 0;
      margin: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .pwd-field__eye:active {
      opacity: 0.7;
    }
    /* Figma 382:10103 — 与上一块间距 9；验证码行 */
    .pwd-links {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 9px;
    }
    .pwd-links__left {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .pwd-links__left a,
    .pwd-links__right {
      font-size: 13px;
      font-weight: 400;
      line-height: 18.2px;
      color: #0d5096;
      text-decoration: none;
      cursor: pointer;
    }
    .pwd-links__icon {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      display: block;
    }
    /* Figma 382:10106 — 与链接行间距 25；按钮高 50 圆角 12 */
    .pwd-submit {
      width: 100%;
      height: 50px;
      margin-top: 25px;
      margin-bottom: 0;
      border: none;
      border-radius: 12px;
      background: var(--c-primary);
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      line-height: 22.4px;
      color: #000;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .pwd-submit:active {
      opacity: 0.92;
    }
    /* Figma 382:10110 Frame 965 — 与按钮间距 17 */
    .pwd-terms {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      margin-top: 17px;
      margin-bottom: 0;
    }
    .pwd-terms__native-checkbox {
      display: none;
    }
    .pwd-terms__toggle {
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      line-height: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .pwd-terms__checkbox {
      width: 11px;
      height: 11px;
      display: block;
      cursor: pointer;
    }
    .pwd-terms__copy {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      font-size: 11px;
      font-weight: 400;
      line-height: 15.4px;
      color: #8c8c8c;
    }
    .pwd-terms__line {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      column-gap: 4px;
      row-gap: 0;
    }
    .pwd-terms__line--2 {
      display: block;
      margin-top: 0;
    }
    .pwd-terms__text,
    .pwd-terms__link {
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      line-height: inherit;
    }
    .pwd-terms__link {
      color: #0d5096;
      cursor: pointer;
      text-decoration: none;
    }
    .auth-footer-area {
      margin-top: auto;
      flex-shrink: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .auth-footer-area__row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 25px;
      padding-top: 20px;
      margin-bottom: 16px;
    }
    .social-icon-btn {
      width: 47px;
      height: 47px;
      border-radius: 50%;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
    }
    .auth-footer-area__recover-btn {
      box-sizing: border-box;
      min-height: 44.4px;
      padding: 13px 20px 14px;
      border-radius: 22.2px;
      border: 0.5px solid rgba(34, 34, 34, 0.3);
      background: transparent;
      font-family: inherit;
      font-size: 13px;
      font-weight: 400;
      line-height: 18.2px;
      color: rgba(34, 34, 34, 0.3);
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .auth-footer-area__recover-btn:active {
      opacity: 0.85;
    }
    /* 与 phone-verify：原键盘图 + 透明热区，高约 308 */
    .auth-keypad-wrap {
      position: relative;
      width: 100%;
      height: 308px;
      flex-shrink: 0;
      overflow: hidden;
      line-height: 0;
      background: #d1d2d6;
    }
    .auth-keypad-wrap__img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: bottom center;
      pointer-events: none;
      user-select: none;
    }
    .auth-keypad-wrap__hits {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .auth-keypad-hit {
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .auth-keypad-hit:focus {
      outline: none;
    }
    .auth-keypad-hit-skip {
      pointer-events: none;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>

  <script>
    window.populateAssets && window.populateAssets();

    var uncheckedSrc = '../assets/images/login_unchecked.svg?v=2';
    var checkedSrc = '../assets/images/hint_checked.svg?v=2';

    document.getElementById('btn-back').addEventListener('click', function() { Router.back(); });

    (function setupPwdEye() {
      var btn = document.getElementById('toggle-pwd');
      var inp = document.getElementById('pwd-input');
      var openSvg = document.getElementById('pwd-eye-open');
      var offSvg = document.getElementById('pwd-eye-off');
      if (!btn || !inp) return;
      var useWebkitMask = typeof CSS !== 'undefined' && CSS.supports && CSS.supports('-webkit-text-security', 'disc');
      function isMasked() {
        if (useWebkitMask) return inp.classList.contains('pwd-field__input--masked');
        return inp.type === 'password';
      }
      function sync() {
        var visible = !isMasked();
        /* 明文 → 睁眼；遮罩 → 闭眼（与「闭眼=不可读」一致） */
        if (openSvg) openSvg.style.display = visible ? 'block' : 'none';
        if (offSvg) offSvg.style.display = visible ? 'none' : 'block';
        btn.setAttribute('aria-label', visible ? '隐藏密码' : '显示密码');
      }
      function setMasked(m) {
        if (m) {
          if (useWebkitMask) {
            inp.type = 'text';
            inp.classList.add('pwd-field__input--masked');
          } else {
            inp.classList.remove('pwd-field__input--masked');
            inp.type = 'password';
          }
        } else {
          inp.classList.remove('pwd-field__input--masked');
          inp.type = 'text';
        }
      }
      setMasked(true);
      sync();
      btn.addEventListener('click', function() {
        setMasked(!isMasked());
        sync();
      });
    })();

    (function setupAuthKeypad() {
      var phoneInput = document.getElementById('phone-input');
      var pwdInput = document.getElementById('pwd-input');
      var pad = document.getElementById('pwd-page-keypad');
      var content = document.querySelector('.auth-page .auth-content');
      if (!phoneInput || !pwdInput || !pad) return;

      var lastTarget = phoneInput;

      function digitsOnly(s) {
        return (s || '').replace(/\D/g, '');
      }

      function clampPhone(raw) {
        return digitsOnly(raw).slice(0, 11);
      }

      function activeOrLast() {
        var a = document.activeElement;
        if (a === phoneInput || a === pwdInput) return a;
        return lastTarget;
      }

      if (content) {
        content.addEventListener('focusin', function(e) {
          if (e.target === phoneInput || e.target === pwdInput) lastTarget = e.target;
        });
      }

      function insertDigit(target, digit) {
        var max = target === phoneInput ? 11 : 64;
        if (target === phoneInput) {
          var clean = clampPhone(target.value);
          if (document.activeElement === target && target.selectionStart != null) {
            var start = target.selectionStart;
            var end = target.selectionEnd != null ? target.selectionEnd : start;
            var v = target.value;
            if (start === end && digitsOnly(v).length >= 11) return;
            var merged = clampPhone(v.slice(0, start) + digit + v.slice(end));
            target.value = merged;
            target.setSelectionRange(Math.min(merged.length, start + 1), Math.min(merged.length, start + 1));
          } else {
            if (clean.length >= 11) return;
            target.value = (clean + digit).slice(0, 11);
            target.focus();
            target.setSelectionRange(target.value.length, target.value.length);
          }
          return;
        }
        var cur = target.value;
        if (document.activeElement === target && target.selectionStart != null) {
          var s0 = target.selectionStart;
          var e0 = target.selectionEnd != null ? target.selectionEnd : s0;
          if (s0 === e0 && cur.length >= max) return;
          var next = (cur.slice(0, s0) + digit + cur.slice(e0)).slice(0, max);
          target.value = next;
          target.setSelectionRange(Math.min(s0 + 1, next.length), Math.min(s0 + 1, next.length));
        } else {
          if (cur.length >= max) return;
          target.value = (cur + digit).slice(0, max);
          target.focus();
          target.setSelectionRange(target.value.length, target.value.length);
        }
      }

      function deleteOne(target) {
        if (document.activeElement === target && target.selectionStart != null) {
          var start = target.selectionStart;
          var end = target.selectionEnd != null ? target.selectionEnd : start;
          var v = target.value;
          if (start === end) {
            if (start < 1) return;
            var merged = target === phoneInput
              ? clampPhone(v.slice(0, start - 1) + v.slice(start))
              : (v.slice(0, start - 1) + v.slice(start)).slice(0, 64);
            target.value = merged;
            target.setSelectionRange(Math.min(start - 1, merged.length), Math.min(start - 1, merged.length));
          } else {
            var merged2 = target === phoneInput
              ? clampPhone(v.slice(0, start) + v.slice(end))
              : (v.slice(0, start) + v.slice(end)).slice(0, 64);
            target.value = merged2;
            target.setSelectionRange(Math.min(start, merged2.length), Math.min(start, merged2.length));
          }
        } else {
          if (target === phoneInput) {
            target.value = clampPhone(target.value).slice(0, -1);
          } else {
            target.value = target.value.slice(0, -1);
          }
          target.focus();
          target.setSelectionRange(target.value.length, target.value.length);
        }
      }

      pad.addEventListener('click', function(e) {
        var hit = e.target.closest('.auth-keypad-hit');
        if (!hit) return;
        e.preventDefault();
        var t = activeOrLast();
        if (hit.getAttribute('data-action') === 'delete') {
          deleteOne(t);
          t.focus();
          return;
        }
        var digit = hit.getAttribute('data-digit');
        if (digit != null && digit !== '') {
          insertDigit(t, digit);
          t.focus();
        }
      });

      phoneInput.addEventListener('paste', function(e) {
        e.preventDefault();
        var text = (e.clipboardData || window.clipboardData).getData('text') || '';
        phoneInput.value = clampPhone(text);
      });
      phoneInput.addEventListener('input', function() {
        var cur = phoneInput.value;
        var next = clampPhone(cur);
        if (cur !== next) {
          phoneInput.value = next;
          phoneInput.setSelectionRange(next.length, next.length);
        }
      });
    })();

    (function setupTermsToggle() {
      var checkbox = document.getElementById('pwd-terms-checkbox');
      var toggleBtn = document.getElementById('pwd-terms-toggle');
      var checkboxImg = document.getElementById('pwd-terms-checkbox-img');
      var termsCopy = document.getElementById('pwd-terms-copy');

      function syncCheckboxImage() {
        if (!checkbox || !checkboxImg) return;
        checkboxImg.src = checkbox.checked ? checkedSrc : uncheckedSrc;
      }

      if (checkbox) checkbox.checked = false;
      syncCheckboxImage();

      if (toggleBtn && checkbox) {
        toggleBtn.addEventListener('click', function (event) {
          event.stopPropagation();
          checkbox.checked = !checkbox.checked;
          syncCheckboxImage();
        });
      }

      if (termsCopy && checkbox) {
        termsCopy.addEventListener('click', function (event) {
          if (event.target.closest('.pwd-terms__link')) return;
          checkbox.checked = !checkbox.checked;
          syncCheckboxImage();
        });
      }
    })();

    document.getElementById('btn-submit').addEventListener('click', function() {
      var checkbox = document.getElementById('pwd-terms-checkbox');
      if (checkbox && !checkbox.checked) {
        return;
      }
      Auth.setLoggedIn();
      Router.go('home.html');
    });
  </script>
</body>
</html>
