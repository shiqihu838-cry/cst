<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <title>启动页 - Vibe</title>
  <link rel="stylesheet" href="../css/base/variables.css">
  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/typography.css">
  <link rel="stylesheet" href="../css/components/status-bar.css">
  <link rel="stylesheet" href="../css/pages/splash.css">
</head>
<body>
  <div class="phone-frame">
    <div class="page splash-page">

      <!-- Status Bar -->
      <header class="page-header">
        <div class="status-bar status-bar--image">
          <img class="status-bar__header-image" src="../assets/images/header.png" alt="status bar">
        </div>
      </header>

      <!-- Brand -->
      <div class="page-body">
        <div class="splash-brand">
          <img class="splash-brand__logo" data-asset="splash_vibe_logo" alt="Vibe">
          <p class="splash-brand__tagline">自在玩乐&nbsp;&nbsp;同频相伴</p>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/utils/auth.js"></script>
  <script src="../js/utils/assets.js"></script>
  <script src="../js/utils/router.js"></script>
  <script src="../js/pages/splash.js"></script>
</body>
</html>
