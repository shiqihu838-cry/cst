<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录 - Vibe</title>
  <link rel="stylesheet" href="../css/base/variables.css">
  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/typography.css">
  <link rel="stylesheet" href="../css/components/status-bar.css">
  <link rel="stylesheet" href="../css/components/button.css">
  <link rel="stylesheet" href="../css/pages/login.css">
</head>
<body>
  <div class="phone-frame">
    <div class="page login-page">

      <!-- Status Bar -->
      <header class="page-header">
        <div class="status-bar status-bar--use-header-image">
          <span class="status-bar__time">09:41</span>
          <div class="status-bar__indicators">
            <svg width="19" height="12" viewBox="0 0 20 12" fill="none">
              <rect x="0" y="7" width="3" height="5" rx="0.5" fill="black"/>
              <rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="black"/>
              <rect x="9" y="3" width="3" height="9" rx="0.5" fill="black"/>
              <rect x="13.5" y="1" width="3" height="11" rx="0.5" fill="black"/>
              <rect x="18" y="0" width="2" height="12" rx="0.5" fill="black" opacity="0.3"/>
            </svg>
            <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
              <circle cx="8.5" cy="10.5" r="1.5" fill="black"/>
              <path d="M5 7.5C6.1 6.4 7.2 5.9 8.5 5.9s2.4 0.5 3.5 1.6" stroke="black" stroke-width="1.4" stroke-linecap="round" fill="none"/>
              <path d="M2.5 5C4.3 3.2 6.3 2.3 8.5 2.3s4.2 0.9 6 2.7" stroke="black" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            </svg>
            <svg width="27" height="13" viewBox="0 0 27 13" fill="none">
              <rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="black" stroke-opacity="0.35"/>
              <rect x="2" y="2" width="17" height="9" rx="2" fill="black"/>
              <path d="M24 4v5a2.5 2.5 0 000-5z" fill="black" fill-opacity="0.4"/>
            </svg>
          </div>
        </div>
      </header>

      <!-- Page body -->
      <div class="page-body">
        <!-- Help -->
        <div class="login-help">
          <a href="#">帮助</a>
        </div>

        <!-- Brand -->
        <div class="login-brand">
          <img class="login-brand__logo" data-asset="login_vibe_logo" alt="Vibe">
          <p class="login-brand__tagline">自在玩乐&nbsp;&nbsp;同频相伴</p>
        </div>

        <!-- Login actions -->
        <div class="login-actions">
          <!-- WeChat login -->
          <button class="login-wechat" id="btn-wechat" type="button">
            <img class="login-wechat__icon" data-asset="login_wechat_mask" alt="">
            <span class="login-wechat__text">微信登录</span>
          </button>

          <!-- Other social logins -->
          <div class="login-socials">
            <button class="btn btn--social" id="btn-qq" type="button" title="QQ登录">
              <img style="width:25px;height:25px;object-fit:contain" data-asset="login_qq" alt="QQ">
            </button>
            <button class="btn btn--social" id="btn-phone" type="button" title="手机号登录">
              <img style="width:13px;height:21px;object-fit:contain" data-asset="login_phone" alt="手机">
            </button>
            <button class="btn btn--social" id="btn-apple" type="button" title="Apple登录">
              <img style="width:22px;height:22px;object-fit:contain" data-asset="login_apple" alt="Apple">
            </button>
          </div>
        </div>

        <!-- Terms -->
        <div class="login-terms">
          <input type="checkbox" id="terms-checkbox" class="login-terms__native-checkbox">
          <button id="terms-toggle" class="login-terms__toggle" type="button" aria-label="同意条款">
            <img id="checkbox-img" class="login-terms__checkbox" data-asset="login_unchecked" alt="checkbox">
          </button>
          <span class="login-terms__text">已阅读并同意</span>
          <span class="login-terms__link">隐私政策</span>
          <span class="login-terms__text">和</span>
          <span class="login-terms__link">服务条款</span>
        </div>
      </div><!-- .page-body -->

    </div>
  </div>

  <script src="../js/utils/auth.js"></script>
  <script src="../js/utils/assets.js"></script>
  <script src="../js/utils/router.js"></script>
  <script src="../js/pages/login.js"></script>
</body>
</html>
