<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的 - Vibe</title>
  <link rel="stylesheet" href="../css/base/variables.css">
  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/typography.css">
  <link rel="stylesheet" href="../css/components/status-bar.css">
  <link rel="stylesheet" href="../css/components/nav-bar.css">
  <style>
    * { box-sizing: border-box; }
    body { background: #f8f8f8; }
    .phone-frame { width: 402px; height: 889px; margin: 0 auto; background: #f8f8f8; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .page { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Hero area */
    .profile-hero { position: relative; height: 239px; flex-shrink: 0; overflow: hidden; }
    .profile-hero__bg { position: absolute; inset: 0; background: url('../assets/images/背景.png') center/cover no-repeat; }
    .profile-hero__overlay { position: absolute; top: 85.691px; left: 0; width: 401.722px; height: 203.583px; background: linear-gradient(180deg, rgba(8, 176, 209, 0.00) 6.85%, #08B0D1 117.94%); pointer-events: none; }

    /* Status bar on hero — white text */
    .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 21px 24px 0; height: 62px; position: relative; z-index: 2; }
    .status-bar__time { font-size: 15px; font-weight: 600; color: #fff; }
    .status-bar__indicators { display: flex; align-items: center; gap: 6px; }

    .hero-main { position: relative; height: 177px; }
    /* Hero top action row */
    .hero-action-row { position: relative; z-index: 3; height: 38px; padding: 8px 16px 0; display: flex; align-items: flex-start; justify-content: space-between; }
    .hero-top-actions { display: flex; align-items: flex-start; gap: 20px; }
    .hero-top-actions svg { cursor: pointer; }

    /* Avatar area */
    .hero-avatar-area { position: absolute; bottom: 20px; left: 16px; z-index: 3; display: flex; align-items: center; gap: 30px; }
    .hero-avatar-wrap { position: relative; width: 100px; height: 100px; }
    .hero-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background: #ddd; border: 2px solid #fff; }
    .hero-avatar-dot { position: absolute; bottom: 6px; right: 2px; width: 20px; height: 20px; border-radius: 50%; background: #00FF48; border: 3px solid #fff; }
    .hero-user-info { padding-bottom: 0; }
    .hero-username { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .hero-user-id { font-size: 11px; color: rgba(255,255,255,0.8); }

    /* Edit button */
    .hero-edit-btn { width: 95px; height: 30px; z-index: 3; display: flex; align-items: center; justify-content: center; gap: 5px; background: rgba(255,255,255,0.15); border: 0.5px solid rgba(255,255,255,1); border-radius: 22.2px; padding: 0 12px; cursor: pointer; flex-shrink: 0; }
    .hero-edit-btn svg { width: 12px; height: 12px; display: block; flex-shrink: 0; }
    .hero-edit-btn span { display: block; font-size: 13px; color: #fff; font-weight: 400; line-height: 1; white-space: nowrap; }

    /* White card area */
    .profile-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #fff; margin-top: 0; padding-top: 16px; border-radius: 10px 10px 0 0; position: relative; z-index: 1; }
    .profile-body::-webkit-scrollbar { display: none; }

    /* Tabs */
    .profile-tabs { display: flex; align-items: center; justify-content: flex-start; gap: 50px; background: #fff; border-radius: 10px 10px 0 0; padding: 0 16px; border-bottom: none; }
    .profile-tab { flex: 0 0 auto; position: relative; height: 27px; padding: 0; font-size: 16px; font-family: "PingFang SC", sans-serif; font-style: normal; font-weight: 500; line-height: 22.4px; color: rgba(34, 34, 34, 0.6); text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .profile-tab.is-active { font-weight: 600; color: rgba(34, 34, 34, 0.6); }
    .profile-tab.is-active::after { content: ''; position: absolute; left: 0; right: 0; bottom: 0; width: 100%; height: 3px; border-radius: 2px; background: #00fff6; }

    /* Posts grid */
    .posts-masonry { padding: 10px 10px 0; display: flex; gap: 6px; background: #fff; }
    .masonry-col { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .post-card { background: #fff; border-radius: 8px; overflow: hidden; cursor: pointer; }
    .post-card__img { display: block; width: 100%; object-fit: cover; }
    .post-card__body { padding: 7px 8px 9px; }
    .post-card__title { font-size: 12px; color: #222; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .post-card__foot { display: flex; align-items: center; justify-content: space-between; }
    .post-card__author { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .post-card__author-avatar { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; }
    .post-card__author-name { font-size: 12px; color: #bcbcbc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 92px; }
    .post-card__likes { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #bbb; }

    .nav-bar { border-top: none; }
  </style>
</head>
