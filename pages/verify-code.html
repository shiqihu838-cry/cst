<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>输入验证码 - Vibe</title>
  <link rel="stylesheet" href="../css/base/variables.css">
  <link rel="stylesheet" href="../css/base/reset.css">
  <link rel="stylesheet" href="../css/base/typography.css">
  <link rel="stylesheet" href="../css/components/status-bar.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
  <style>
    .auth-page { background: #fff; }
    .auth-nav { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px 4px; }
    .auth-nav__back { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: none; border: none; }
    .auth-nav__help { font-size: 14px; color: #999; cursor: pointer; }
    .auth-content { padding: 20px 24px 0; }
    .auth-headline { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 10px; }
    .auth-phone-hint { font-size: 14px; color: #111; font-weight: 600; margin-bottom: 32px; }
    .code-boxes { display: flex; gap: 12px; margin-bottom: 36px; }
    .code-box { flex: 1; height: 64px; border: 1.5px solid #e0e0e0; border-radius: 10px; text-align: center; font-size: 28px; font-weight: 700; color: #111; outline: none; background: #fff; }
    .code-box:focus { border-color: var(--c-primary); }
    .auth-btn-primary { width: 100%; height: 50px; background: var(--c-primary); border: none; border-radius: 25px; font-size: 16px; font-weight: 600; color: #111; cursor: pointer; margin-bottom: 20px; }
    .auth-resend-row { display: flex; justify-content: space-between; font-size: 13px; color: #999; }
    .auth-resend-row__link { color: #999; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="page auth-page">

      <header class="page-header">
        <div class="status-bar status-bar--use-header-image">
          <span class="status-bar__time">09:41</span>
          <div class="status-bar__indicators">
            <svg width="19" height="12" viewBox="0 0 20 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="0.5" fill="black"/><rect x="4.5" y="5" width="3" height="7" rx="0.5" fill="black"/><rect x="9" y="3" width="3" height="9" rx="0.5" fill="black"/><rect x="13.5" y="1" width="3" height="11" rx="0.5" fill="black"/></svg>
            <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><circle cx="8.5" cy="10.5" r="1.5" fill="black"/><path d="M5 7.5C6.1 6.4 7.2 5.9 8.5 5.9s2.4 0.5 3.5 1.6" stroke="black" stroke-width="1.4" stroke-linecap="round" fill="none"/><path d="M2.5 5C4.3 3.2 6.3 2.3 8.5 2.3s4.2 0.9 6 2.7" stroke="black" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>
            <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="black" stroke-opacity="0.35"/><rect x="2" y="2" width="17" height="9" rx="2" fill="black"/><path d="M24 4v5a2.5 2.5 0 000-5z" fill="black" fill-opacity="0.4"/></svg>
          </div>
        </div>
        <div class="auth-nav">
          <button class="auth-nav__back" id="btn-back" type="button">
            <svg width="10" height="17" viewBox="0 0 10 17" fill="none"><path d="M9 1L1 8.5L9 16" stroke="#222" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <span class="auth-nav__help">帮助</span>
        </div>
      </header>

      <div class="page-body">
        <div class="auth-content">
          <h1 class="auth-headline">请输入验证码</h1>
          <p class="auth-phone-hint">+86 130 4094 6556</p>

          <div class="code-boxes" id="code-boxes">
            <input class="code-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="code-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="code-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            <input class="code-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
          </div>

          <button class="auth-btn-primary" id="btn-submit" type="button">登录</button>

          <div class="auth-resend-row">
            <span>收不到验证码？</span>
            <span class="auth-resend-row__link" id="resend-timer">39 秒后重新发送</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="../js/utils/auth.js"></script>
  <script src="../js/utils/assets.js"></script>
  <script src="../js/utils/router.js"></script>
  <script>
    var boxes = Array.from(document.querySelectorAll('.code-box'));

    boxes.forEach(function(box, i) {
      box.addEventListener('input', function() {
        if (box.value.length === 1 && i < boxes.length - 1) {
          boxes[i + 1].focus();
        }
        if (boxes.every(function(b) { return b.value.length === 1; })) {
          Auth.setLoggedIn();
          Router.go('home.html');
        }
      });
      box.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && box.value === '' && i > 0) {
          boxes[i - 1].focus();
        }
      });
    });

    document.getElementById('btn-back').addEventListener('click', function() { Router.back(); });
    document.getElementById('btn-submit').addEventListener('click', function() { Auth.setLoggedIn(); Router.go('home.html'); });

    var seconds = 39;
    var timerEl = document.getElementById('resend-timer');
    var timer = setInterval(function() {
      seconds--;
      if (seconds <= 0) {
        clearInterval(timer);
        timerEl.textContent = '重新发送';
      } else {
        timerEl.textContent = seconds + ' 秒后重新发送';
      }
    }, 1000);
  </script>
</body>
</html>
